services:
  - type: web
    name: codeverdict
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codeverdict-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: codeverdict-db
    databaseName: codeverdict
    plan: free